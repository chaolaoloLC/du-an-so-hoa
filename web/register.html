<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - Tin Tức Online</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: linear-gradient(135deg, #27ae60, #2ecc71);
               min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: white; border-radius: 16px; padding: 40px;
                    width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .auth-box h2 { text-align: center; color: #27ae60; margin-bottom: 8px; font-size: 24px; }
        .auth-box p { text-align: center; color: #888; font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #eee;
                            border-radius: 8px; font-size: 14px; outline: none; transition: border 0.2s; }
        .form-group input:focus { border-color: #27ae60; }
        .btn-submit { width: 100%; padding: 13px; background: linear-gradient(135deg, #27ae60, #2ecc71);
                      color: white; border: none; border-radius: 8px; font-size: 16px;
                      font-weight: bold; cursor: pointer; }
        .auth-link { text-align: center; margin-top: 20px; font-size: 14px; color: #888; }
        .auth-link a { color: #27ae60; font-weight: bold; text-decoration: none; }
        .error-msg { background: #fdecea; color: #c0392b; padding: 10px;
                     border-radius: 6px; font-size: 13px; margin-bottom: 16px; display: none; }
        .success-msg { background: #d5f5e3; color: #27ae60; padding: 10px;
                       border-radius: 6px; font-size: 13px; margin-bottom: 16px; display: none; }
    </style>
</head>
<body>
<div class="auth-box">
    <h2>📝 Đăng ký tài khoản</h2>
    <p>Tạo tài khoản miễn phí ngay!</p>
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>
    <div class="form-group">
        <label>Họ và tên</label>
        <input type="text" id="fullName" placeholder="Nhập họ và tên"/>
    </div>
    <div class="form-group">
        <label>Tên đăng nhập</label>
        <input type="text" id="username" placeholder="Nhập tên đăng nhập"/>
    </div>
    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Nhập email"/>
    </div>
    <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" id="password" placeholder="Nhập mật khẩu"/>
    </div>
    <button class="btn-submit" onclick="register()">Đăng ký</button>
    <div class="auth-link">
        Đã có tài khoản? <a href="login.html">Đăng nhập</a>
        &nbsp;|&nbsp; <a href="index.html">← Trang chủ</a>
    </div>
</div>
<script>
function register() {
    const fullName = document.getElementById('fullName').value.trim();
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    errorMsg.style.display = 'none';
    if (!fullName || !username || !password) {
        errorMsg.textContent = '❌ Vui lòng điền đầy đủ thông tin!';
        errorMsg.style.display = 'block'; return;
    }
    const users = JSON.parse(localStorage.getItem('users')) || [];
    if (users.find(u => u.username === username)) {
        errorMsg.textContent = '❌ Tên đăng nhập đã tồn tại!';
        errorMsg.style.display = 'block'; return;
    }
    users.push({ username, password, email, fullName, role: 'member' });
    localStorage.setItem('users', JSON.stringify(users));
    successMsg.textContent = '✅ Đăng ký thành công! Chuyển đến trang đăng nhập...';
    successMsg.style.display = 'block';
    setTimeout(() => window.location.href = 'login.html', 1500);
}
</script>
</body>
</html>
