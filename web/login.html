<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Tin Tức Online</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: linear-gradient(135deg, #c0392b, #e74c3c); 
               min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: white; border-radius: 16px; padding: 40px; 
                    width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .auth-box h2 { text-align: center; color: #c0392b; margin-bottom: 8px; font-size: 24px; }
        .auth-box p { text-align: center; color: #888; font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #eee; 
                            border-radius: 8px; font-size: 14px; outline: none; transition: border 0.2s; }
        .form-group input:focus { border-color: #e74c3c; }
        .btn-submit { width: 100%; padding: 13px; background: linear-gradient(135deg, #c0392b, #e74c3c);
                      color: white; border: none; border-radius: 8px; font-size: 16px; 
                      font-weight: bold; cursor: pointer; margin-top: 8px; }
        .btn-submit:hover { opacity: 0.9; }
        .auth-link { text-align: center; margin-top: 20px; font-size: 14px; color: #888; }
        .auth-link a { color: #c0392b; font-weight: bold; text-decoration: none; }
        .error-msg { background: #fdecea; color: #c0392b; padding: 10px; 
                     border-radius: 6px; font-size: 13px; margin-bottom: 16px; display: none; }
        .demo-accounts { background: #f8f9fa; border-radius: 8px; padding: 12px; 
                         margin-bottom: 16px; font-size: 13px; color: #555; }
        .demo-accounts b { color: #c0392b; }
    </style>
</head>
<body>
<div class="auth-box">
    <h2>🔐 Đăng nhập</h2>
    <p>Chào mừng trở lại!</p>
    
    <div class="demo-accounts">
        💡 <b>Tài khoản demo:</b><br>
        Admin: <b>admin</b> / <b>admin123</b><br>
        User: <b>user1</b> / <b>123456</b>
    </div>

    <div class="error-msg" id="errorMsg">❌ Sai tên đăng nhập hoặc mật khẩu!</div>

    <div class="form-group">
        <label>Tên đăng nhập</label>
        <input type="text" id="username" placeholder="Nhập tên đăng nhập"/>
    </div>
    <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" id="password" placeholder="Nhập mật khẩu"/>
    </div>
    <button class="btn-submit" onclick="login()">Đăng nhập</button>
    <div class="auth-link">
        Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
        &nbsp;|&nbsp; <a href="index.html">← Trang chủ</a>
    </div>
</div>
<script>
const users = JSON.parse(localStorage.getItem('users')) || [
    { username: 'admin', password: 'admin123', role: 'admin', fullName: 'Quản trị viên' },
    { username: 'user1', password: '123456', role: 'member', fullName: 'Người dùng 1' }
];
localStorage.setItem('users', JSON.stringify(users));

function login() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    const user = users.find(x => x.username === u && x.password === p);
    if (user) {
        localStorage.setItem('currentUser', JSON.stringify(user));
        window.location.href = user.role === 'admin' ? 'admin.html' : 'index.html';
    } else {
        document.getElementById('errorMsg').style.display = 'block';
    }
}
document.addEventListener('keypress', e => { if(e.key==='Enter') login(); });
</script>
</body>
</html>
